# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: test

on:
  push: 
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs: 

  django_50: 

    runs-on: ubuntu-latest
    strategy:
      matrix: 
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v2
    - uses: kamiazya/setup-graphviz@v1
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v2
      with:
        python-version:  ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install "Django~=5.0"
        pip install -r example/requirements-ci.txt
    - name: Setup DB
      run: |
        ./example/manage.py makemigrations
        ./example/manage.py migrate
    - name: Run tests
      run: |
        coverage run --parallel-mode --branch --source='computedfields' ./example/manage.py test exampleapp
        coverage run --parallel-mode --branch --source='computedfields' ./example/manage.py test test_full
        coverage combine
        coverage report
    - name: Build docs
      run: |
        cd docs && make html
        cd ../
    - name: Coveralls
      uses: AndreMiras/coveralls-python-action@develop
      with:
        parallel: true
        flag-name:  Unit Test

  django_6:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:  ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v2
    - uses: kamiazya/setup-graphviz@v1
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix. python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install "Django~=6.0"
        pip install -r example/requirements-ci.txt
    - name: Setup DB
      run: |
        ./example/manage.py makemigrations
        ./example/manage.py migrate
    - name: Run tests
      run: |
        coverage run --parallel-mode --branch --source='computedfields' ./example/manage.py test exampleapp
        coverage run --parallel-mode --branch --source='computedfields' ./example/manage.py test test_full
        coverage combine
        coverage report
    - name: Build docs
      run: |
        cd docs && make html
        cd ../
    - name: Coveralls
      uses: AndreMiras/coveralls-python-action@develop
      with:
        parallel: true
        flag-name: Unit Test
        
  mysql:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]
    services:
      mysql:
        image: mysql:latest
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: database
        ports: ['3306:3306']
    steps:
    - uses: actions/checkout@v2
